<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>生日快乐 ✨</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      touch-action: none;
    }

    body {
      min-height: 100vh;
      overflow: hidden;
      font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(180deg,
        #4A3728 0%,
        #6B4E3D 10%,
        #8B6B5A 20%,
        #C4726B 35%,
        #7B6B8A 50%,
        #4A5568 70%,
        #1A1A2E 100%
      );
      position: relative;
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
      padding-left: env(safe-area-inset-left);
      padding-right: env(safe-area-inset-right);
    }

    .scene {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    .mountains {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 35%;
      z-index: 2;
    }

    .mountain {
      position: absolute;
      bottom: 0;
      border-left: 50vw solid transparent;
      border-right: 50vw solid transparent;
    }

    .mountain-1 {
      left: -20%;
      border-bottom: 30vh solid #0D1117;
    }

    .mountain-2 {
      left: 10%;
      border-bottom: 40vh solid #161B22;
    }

    .mountain-3 {
      left: 30%;
      border-bottom: 33vh solid #111827;
    }

    .mountain-4 {
      left: 50%;
      border-bottom: 45vh solid #1F2937;
    }

    .mountain-5 {
      left: 70%;
      border-bottom: 38vh solid #111827;
    }

    .mountain-6 {
      left: 85%;
      border-bottom: 32vh solid #0D1117;
    }

    .clouds {
      position: absolute;
      width: 100%;
      height: 100%;
      z-index: 3;
      overflow: hidden;
    }

    .cloud {
      position: absolute;
      background: radial-gradient(ellipse at center, rgba(180,160,140,0.5) 0%, rgba(180,160,140,0) 70%);
      border-radius: 50%;
      filter: blur(12px);
      animation: float-cloud linear infinite;
    }

    @keyframes float-cloud {
      from { transform: translateX(-100px); }
      to { transform: translateX(calc(100vw + 100px)); }
    }

    .cloud-1 { width: 180px; height: 50px; top: 10%; animation-duration: 60s; opacity: 0.6; }
    .cloud-2 { width: 250px; height: 70px; top: 20%; animation-duration: 80s; animation-delay: -20s; opacity: 0.5; }
    .cloud-3 { width: 200px; height: 60px; top: 15%; animation-duration: 70s; animation-delay: -40s; opacity: 0.7; }
    .cloud-4 { width: 150px; height: 45px; top: 25%; animation-duration: 90s; animation-delay: -10s; opacity: 0.4; }
    .cloud-5 { width: 300px; height: 80px; top: 8%; animation-duration: 100s; animation-delay: -30s; opacity: 0.5; }

    #meteor-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 5;
    }

    .stars {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 55%;
      z-index: 4;
      pointer-events: none;
    }

    .star {
      position: absolute;
      width: 1.5px;
      height: 1.5px;
      background: white;
      border-radius: 50%;
      animation: twinkle 2s ease-in-out infinite;
    }

    @keyframes twinkle {
      0%, 100% { opacity: 0.3; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.5); }
    }

    .content {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 20;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 16px;
      padding-top: calc(16px + env(safe-area-inset-top));
      padding-bottom: calc(16px + env(safe-area-inset-bottom));
    }

    .main-message {
      font-family: 'Noto Serif SC', serif;
      font-size: 1.2rem;
      color: #fff;
      text-align: center;
      line-height: 2.2;
      opacity: 0;
      text-shadow: 0 0 30px rgba(255, 215, 0, 0.8), 0 0 60px rgba(255, 215, 0, 0.4);
      letter-spacing: 0.12em;
      max-width: 95%;
      transition: opacity 1.5s ease;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      white-space: normal;
      word-break: keep-all;
    }

    .main-message.visible {
      opacity: 1;
    }

    .main-message .char {
      display: inline-block;
      opacity: 0;
      transition: opacity 0.1s ease;
    }

    .main-message .char.visible {
      opacity: 1;
    }

    .main-message .cursor {
      display: inline-block;
      width: 2px;
      height: 1.1em;
      background: #FFD700;
      margin-left: 2px;
      vertical-align: middle;
      animation: blink 0.8s infinite;
    }

    @keyframes blink {
      0%, 50% { opacity: 1; }
      51%, 100% { opacity: 0; }
    }

    .form-container {
      opacity: 0;
      transform: scale(0.9);
      transition: all 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
      pointer-events: none;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0.9);
      width: 92%;
      max-width: 420px;
    }

    .form-container.visible {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
      pointer-events: auto;
    }

    .form-card {
      background: linear-gradient(145deg, rgba(60, 40, 60, 0.92), rgba(30, 20, 40, 0.96));
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      border-radius: 24px;
      padding: 32px 24px;
      border: 1px solid rgba(255, 215, 0, 0.2);
      box-shadow:
        0 20px 60px rgba(0, 0, 0, 0.5),
        0 0 40px rgba(255, 107, 157, 0.1),
        inset 0 1px 0 rgba(255, 255, 255, 0.1);
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .form-card::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(255, 215, 0, 0.05) 0%, transparent 50%);
      animation: rotate-glow 10s linear infinite;
    }

    @keyframes rotate-glow {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .card-decoration {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 18px;
      position: relative;
      z-index: 1;
    }

    .deco-line {
      width: 45px;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255, 215, 0, 0.5), transparent);
    }

    .deco-star {
      color: #FFD700;
      font-size: 1rem;
      animation: pulse-star 2s ease-in-out infinite;
    }

    @keyframes pulse-star {
      0%, 100% { transform: scale(1); opacity: 0.7; }
      50% { transform: scale(1.2); opacity: 1; }
    }

    .card-title {
      font-family: 'Noto Serif SC', serif;
      font-size: 1.6rem;
      color: #FFD93D;
      margin-bottom: 10px;
      text-shadow: 0 0 20px rgba(255, 217, 61, 0.5);
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .title-icon {
      font-size: 1.3rem;
    }

    .card-subtitle {
      font-size: 0.85rem;
      color: rgba(255, 255, 255, 0.7);
      margin-bottom: 26px;
      position: relative;
      z-index: 1;
      line-height: 1.6;
    }

    .form-body {
      position: relative;
      z-index: 1;
    }

    .input-group {
      margin-bottom: 20px;
      text-align: left;
    }

    .input-group label {
      display: block;
      font-size: 0.82rem;
      color: rgba(255, 255, 255, 0.8);
      margin-bottom: 8px;
      letter-spacing: 0.08em;
    }

    .name-input {
      width: 100%;
      padding: 14px 16px;
      font-size: 1rem;
      border: 2px solid rgba(255, 215, 0, 0.2);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.05);
      color: #fff;
      outline: none;
      transition: all 0.3s ease;
      font-family: inherit;
      -webkit-user-select: text;
      user-select: text;
    }

    .name-input::placeholder {
      color: rgba(255, 255, 255, 0.4);
      font-size: 0.9rem;
    }

    .name-input:focus {
      border-color: #FFD93D;
      background: rgba(255, 255, 255, 0.1);
      box-shadow: 0 0 25px rgba(255, 217, 61, 0.3);
    }

    .name-input.shake {
      animation: shake 0.5s ease;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%, 60% { transform: translateX(-8px); }
      40%, 80% { transform: translateX(8px); }
    }

    .gender-select {
      display: flex;
      gap: 12px;
    }

    .gender-option {
      flex: 1;
      cursor: pointer;
    }

    .gender-option input {
      display: none;
    }

    .gender-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 12px 16px;
      font-size: 0.95rem;
      border: 2px solid rgba(255, 255, 255, 0.15);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.03);
      color: rgba(255, 255, 255, 0.7);
      transition: all 0.3s ease;
    }

    .gender-option input:checked + .gender-btn {
      border-color: #FFD93D;
      background: rgba(255, 217, 61, 0.15);
      color: #FFD93D;
      box-shadow: 0 0 20px rgba(255, 217, 61, 0.2);
    }

    .form-actions {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 8px;
      position: relative;
      z-index: 1;
    }

    .form-back-btn {
      width: 100%;
      padding: 12px 24px;
      font-size: 0.95rem;
      border: 2px solid rgba(255, 255, 255, 0.2);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.05);
      color: rgba(255, 255, 255, 0.8);
      cursor: pointer;
      transition: all 0.2s ease;
      font-family: inherit;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      -webkit-tap-highlight-color: transparent;
    }

    .form-back-btn:active {
      transform: scale(0.98);
      background: rgba(255, 255, 255, 0.1);
    }

    .submit-btn {
      width: 100%;
      padding: 16px 28px;
      font-size: 1rem;
      font-weight: 500;
      border: none;
      border-radius: 14px;
      background: linear-gradient(135deg, #FF6B9D 0%, #C44569 100%);
      color: #fff;
      cursor: pointer;
      transition: all 0.2s ease;
      font-family: inherit;
      box-shadow: 0 8px 25px rgba(255, 107, 157, 0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      -webkit-tap-highlight-color: transparent;
    }

    .submit-btn:active {
      transform: scale(0.98);
      box-shadow: 0 4px 15px rgba(255, 107, 157, 0.3);
    }

    .btn-icon {
      font-size: 1.1rem;
    }

    .card-footer-deco {
      margin-top: 22px;
      color: rgba(255, 215, 0, 0.4);
      font-size: 0.75rem;
      letter-spacing: 0.4em;
      position: relative;
      z-index: 1;
    }

    .blessing-container {
      opacity: 0;
      transform: scale(0.9);
      transition: all 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
      pointer-events: none;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0.9);
      width: 92%;
      max-width: 420px;
    }

    .blessing-container.visible {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
      pointer-events: auto;
    }

    .blessing-card {
      background: linear-gradient(145deg, rgba(60, 40, 60, 0.92), rgba(30, 20, 40, 0.96));
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      border-radius: 24px;
      padding: 40px 28px;
      border: 1px solid rgba(255, 215, 0, 0.2);
      box-shadow:
        0 20px 60px rgba(0, 0, 0, 0.5),
        0 0 40px rgba(255, 107, 157, 0.1);
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .blessing-card::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(255, 215, 0, 0.05) 0%, transparent 50%);
      animation: rotate-glow 10s linear infinite;
    }

    .recipient-name {
      font-family: 'Noto Serif SC', serif;
      font-size: 1.5rem;
      color: #FFD93D;
      margin-bottom: 22px;
      text-shadow: 0 0 30px rgba(255, 217, 61, 0.6);
      position: relative;
      z-index: 1;
      line-height: 1.4;
      word-break: keep-all;
    }

    .blessing-text {
      font-size: 1.05rem;
      color: #fff;
      line-height: 2;
      min-height: 85px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.5s ease;
      position: relative;
      z-index: 1;
      text-shadow: 0 2px 10px rgba(0,0,0,0.3);
    }

    .blessing-text.fade {
      opacity: 0;
    }

    .blessing-actions {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 24px;
      position: relative;
      z-index: 1;
    }

    .back-btn {
      width: 100%;
      padding: 12px 24px;
      font-size: 0.95rem;
      border: 2px solid rgba(255, 255, 255, 0.2);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.05);
      color: rgba(255, 255, 255, 0.8);
      cursor: pointer;
      transition: all 0.2s ease;
      font-family: inherit;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      -webkit-tap-highlight-color: transparent;
    }

    .back-btn:active {
      transform: scale(0.98);
      background: rgba(255, 255, 255, 0.1);
    }

    .refresh-btn {
      width: 100%;
      padding: 14px 24px;
      font-size: 0.95rem;
      border: 2px solid rgba(255, 215, 0, 0.3);
      border-radius: 14px;
      background: rgba(255, 215, 0, 0.1);
      color: #FFD93D;
      cursor: pointer;
      transition: all 0.2s ease;
      font-family: inherit;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      position: relative;
      z-index: 1;
      -webkit-tap-highlight-color: transparent;
    }

    .refresh-btn:active {
      transform: scale(0.98);
      background: rgba(255, 215, 0, 0.2);
    }

    .blessing-footer {
      margin-top: 26px;
      color: rgba(255, 215, 0, 0.4);
      font-size: 0.75rem;
      letter-spacing: 0.4em;
      position: relative;
      z-index: 1;
    }

    .progress-bar {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 2px;
      background: rgba(255, 255, 255, 0.1);
      z-index: 100;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #FF6B9D, #FFD93D);
      width: 0%;
      transition: width 0.3s ease;
    }
  </style>
</head>
<body>
  <div class="progress-bar">
    <div class="progress-fill" id="progressFill"></div>
  </div>

  <div class="scene">
    <div class="mountains">
      <div class="mountain mountain-1"></div>
      <div class="mountain mountain-2"></div>
      <div class="mountain mountain-3"></div>
      <div class="mountain mountain-4"></div>
      <div class="mountain mountain-5"></div>
      <div class="mountain mountain-6"></div>
    </div>
    <div class="clouds">
      <div class="cloud cloud-1"></div>
      <div class="cloud cloud-2"></div>
      <div class="cloud cloud-3"></div>
      <div class="cloud cloud-4"></div>
      <div class="cloud cloud-5"></div>
    </div>
  </div>

  <div class="stars" id="stars"></div>

  <canvas id="meteor-canvas"></canvas>

  <div class="content">
    <div class="main-message" id="mainMessage"></div>

    <div class="form-container" id="formContainer">
      <div class="form-card">
        <div class="card-decoration">
          <div class="deco-line"></div>
          <div class="deco-star">✦</div>
          <div class="deco-line"></div>
        </div>

        <div class="card-title">
          <span class="title-icon">🎂</span>
          <span>生日快乐</span>
          <span class="title-icon">🎁</span>
        </div>

        <div class="card-subtitle">在这特别的日子里，送上最真挚的祝福</div>

        <div class="form-body">
          <div class="input-group">
            <label>姓名</label>
            <input type="text" class="name-input" id="nameInput" placeholder="请输入姓名" maxlength="20">
          </div>

          <div class="input-group">
            <label>称谓</label>
            <div class="gender-select">
              <label class="gender-option">
                <input type="radio" name="gender" value="先生" checked>
                <span class="gender-btn">👨 先生</span>
              </label>
              <label class="gender-option">
                <input type="radio" name="gender" value="女士">
                <span class="gender-btn">👩 女士</span>
              </label>
            </div>
          </div>

          <div class="form-actions">
            <button class="form-back-btn" id="formBackBtn">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M19 12H5M12 19l-7-7 7-7"/>
              </svg>
              返回
            </button>
            <button class="submit-btn" id="submitBtn">
              <span>送上祝福</span>
              <span class="btn-icon">✨</span>
            </button>
          </div>
        </div>

        <div class="card-footer-deco">
          <span>✧</span><span>✦</span><span>✧</span>
        </div>
      </div>
    </div>

    <div class="blessing-container" id="blessingContainer">
      <div class="blessing-card">
        <div class="recipient-name" id="recipientName"></div>
        <div class="blessing-text" id="blessingText"></div>
        <div class="blessing-actions">
          <button class="back-btn" id="backBtn">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M19 12H5M12 19l-7-7 7-7"/>
            </svg>
            重填祝福
          </button>
          <button class="refresh-btn" id="refreshBtn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M23 4v6h-6M1 20v-6h6"/>
              <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
            </svg>
            换一句
          </button>
        </div>
        <div class="blessing-footer">
          <span>✧</span><span>✦</span><span>✧</span>
        </div>
      </div>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('meteor-canvas');
    const ctx = canvas.getContext('2d');
    const mainMessage = document.getElementById('mainMessage');
    const formContainer = document.getElementById('formContainer');
    const blessingContainer = document.getElementById('blessingContainer');
    const nameInput = document.getElementById('nameInput');
    const submitBtn = document.getElementById('submitBtn');
    const recipientName = document.getElementById('recipientName');
    const blessingText = document.getElementById('blessingText');
    const refreshBtn = document.getElementById('refreshBtn');
    const backBtn = document.getElementById('backBtn');
    const formBackBtn = document.getElementById('formBackBtn');
    const progressFill = document.getElementById('progressFill');
    const starsContainer = document.getElementById('stars');

    const defaultMessage = "愿这漫天星辰，化作最温柔的祝福，点亮你生命中每一个美好的瞬间";
    const blessingMessages = [
      "生日快乐！愿你的每一天都如星辰般闪耀",
      "在这特别的日子里，愿幸福与你形影不离",
      "愿你被世界温柔以待，生日快乐！",
      "新的一岁，愿你所有美好都会如约而至",
      "愿你的笑容永远灿烂如阳光",
      "生日快乐！愿梦想都能照进现实",
      "在这美好的日子，愿你被爱包围，幸福永随",
      "愿你的每一个明天都比今天更精彩",
      "生日快乐！愿你永远保持这份纯真与善良",
      "愿这一刻的温暖，永远留在你心间",
      "生日快乐！愿你成为最好的自己",
      "愿你的生命如同这流星雨般璀璨夺目",
      "在这值得庆祝的日子，愿快乐与你同行",
      "生日快乐！愿你遇见所有美好的风景",
      "愿你永远年轻，永远热泪盈眶",
      "生日快乐！愿爱与希望常伴左右",
      "愿你的每一天都充满惊喜与感动",
      "生日快乐！愿你被岁月温柔以待",
      "愿这漫天星辰，为你照亮前行的路",
      "生日快乐！愿你心之所向，皆能如愿"
    ];

    let meteors = [];
    let animationPhase = 0;
    let lastBlessingIndex = -1;
    let typewriterIndex = 0;
    let typewriterInterval = null;

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }

    function createStars() {
      const count = 45;
      for (let i = 0; i < count; i++) {
        const star = document.createElement('div');
        star.className = 'star';
        star.style.left = Math.random() * 100 + '%';
        star.style.top = Math.random() * 100 + '%';
        star.style.animationDelay = Math.random() * 2 + 's';
        star.style.animationDuration = (1.5 + Math.random()) + 's';
        starsContainer.appendChild(star);
      }
    }

    class Meteor {
      constructor(isBig = false) {
        this.reset(isBig);
      }

      reset(isBig = false) {
        this.x = Math.random() * canvas.width;
        this.y = -100;
        this.isBig = isBig;
        this.length = isBig ? 120 + Math.random() * 80 : 60 + Math.random() * 50;
        this.speed = isBig ? 7 + Math.random() * 3 : 3.5 + Math.random() * 3;
        this.thickness = isBig ? 2.5 + Math.random() * 1.5 : 0.8 + Math.random() * 1.2;
        this.opacity = 0.8 + Math.random() * 0.2;
        this.trail = [];
        this.fadeAlpha = 1;
      }

      update() {
        this.trail.unshift({ x: this.x, y: this.y });

        if (this.trail.length > (this.isBig ? 30 : 15)) {
          this.trail.pop();
        }

        this.x -= this.speed * 0.3;
        this.y += this.speed;

        if (this.y > canvas.height + 100) {
          this.reset(this.isBig && Math.random() > 0.7);
        }
      }

      draw() {
        if (this.trail.length < 2) return;

        const gradient = ctx.createLinearGradient(
          this.x, this.y,
          this.x - this.length * 0.3, this.y - this.length
        );
        gradient.addColorStop(0, `rgba(255, 255, 255, ${this.opacity})`);
        gradient.addColorStop(0.3, `rgba(255, 217, 61, ${this.opacity * 0.8})`);
        gradient.addColorStop(1, `rgba(255, 107, 157, 0)`);

        ctx.beginPath();
        ctx.moveTo(this.x, this.y);

        for (let i = 1; i < this.trail.length; i++) {
          ctx.lineTo(this.trail[i].x, this.trail[i].y);
        }

        ctx.strokeStyle = gradient;
        ctx.lineWidth = this.thickness;
        ctx.lineCap = 'round';
        ctx.stroke();

        ctx.beginPath();
        ctx.arc(this.x, this.y, this.thickness * 2, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`;
        ctx.fill();
      }
    }

    function initMeteors() {
      const count = 25;
      meteors = [];
      for (let i = 0; i < count; i++) {
        const meteor = new Meteor(i === 0);
        meteor.y = Math.random() * canvas.height;
        meteor.x = Math.random() * canvas.width;
        meteors.push(meteor);
      }
    }

    function initTypewriter() {
      mainMessage.innerHTML = '';
      const chars = defaultMessage.split('');

      mainMessage.classList.add('visible');
      typewriterIndex = 0;

      typewriterInterval = setInterval(() => {
        if (typewriterIndex < chars.length) {
          const span = document.createElement('span');
          span.className = 'char';
          span.textContent = chars[typewriterIndex];
          span.style.opacity = '0';
          
          const cursor = document.createElement('span');
          cursor.className = 'cursor';
          
          mainMessage.innerHTML = mainMessage.innerHTML.replace(/<span class="cursor"><\/span>$/, '');
          mainMessage.appendChild(span);
          mainMessage.appendChild(cursor);
          
          setTimeout(() => {
            span.style.opacity = '1';
            span.style.transition = 'opacity 0.15s ease';
          }, 10);
          
          typewriterIndex++;
        } else {
          clearInterval(typewriterInterval);
          setTimeout(() => {
            const cursorEl = mainMessage.querySelector('.cursor');
            if (cursorEl) cursorEl.style.display = 'none';
            animationPhase = 1;
            setTimeout(() => {
              showForm();
            }, 2000);
          }, 500);
        }
      }, 160);
    }

    function resetToTypewriter() {
      blessingContainer.classList.remove('visible');
      formContainer.classList.remove('visible');
      mainMessage.classList.add('visible');
      animationPhase = 0;
      initTypewriter();
    }

    function hideFormAndGoBack() {
      formContainer.classList.remove('visible');
      mainMessage.classList.add('visible');
      animationPhase = 0;
      initTypewriter();
    }

    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      meteors.forEach(meteor => {
        meteor.update();
        meteor.draw();
      });

      requestAnimationFrame(animate);
    }

    function showForm() {
      formContainer.classList.add('visible');
    }

    function getRandomBlessing() {
      let index;
      do {
        index = Math.floor(Math.random() * blessingMessages.length);
      } while (index === lastBlessingIndex && blessingMessages.length > 1);
      lastBlessingIndex = index;
      return blessingMessages[index];
    }

    function showBlessing() {
      const name = nameInput.value.trim();
      if (!name) {
        nameInput.classList.add('shake');
        setTimeout(() => nameInput.classList.remove('shake'), 500);
        return;
      }

      const gender = document.querySelector('input[name="gender"]:checked').value;

      formContainer.classList.remove('visible');
      mainMessage.classList.remove('visible');

      setTimeout(() => {
        recipientName.textContent = `祝 ${name} ${gender} 生日快乐`;
        blessingText.textContent = getRandomBlessing();
        blessingContainer.classList.add('visible');
      }, 500);
    }

    function refreshBlessing() {
      blessingText.classList.add('fade');
      setTimeout(() => {
        blessingText.textContent = getRandomBlessing();
        blessingText.classList.remove('fade');
      }, 500);
    }

    submitBtn.addEventListener('click', showBlessing);
    nameInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') showBlessing();
    });
    refreshBtn.addEventListener('click', refreshBlessing);
    backBtn.addEventListener('click', resetToTypewriter);
    formBackBtn.addEventListener('click', hideFormAndGoBack);

    window.addEventListener('resize', () => {
      resizeCanvas();
      starsContainer.innerHTML = '';
      createStars();
    });

    resizeCanvas();
    createStars();
    initMeteors();
    animate();
    initTypewriter();
  </script>
</body>
</html>
